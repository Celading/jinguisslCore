name: JinguiSSL Package CI

env:
  CANGJIE_SDK_NAME: cangjie-sdk-linux-x64-1.1.3
  CANGJIE_SDK_SHA256: 2b68905afc466e665ae181595c63f96c18d75fd2c1fb6c6f0cb64e179c28d61a
  CANGJIE_SDK_URL: "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.3.tar.gz&objectKey=6a19349d21f5a8178d6fd22b"

on:
  push:
    branches:
      - main
      - master
      - develop
      - "mr/**"
      - "ci/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  public-safety-audit:
    name: Fork-safe public audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Protect CI guard files on external pull requests
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git diff --exit-code "$BASE_SHA" -- .github/workflows/ci.yml scripts/jinguissl_ci_audit.sh
      - name: Static public-surface audit
        run: bash scripts/jinguissl_ci_audit.sh public .

  package-build-test:
    name: Package build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: public-safety-audit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Hosted dependency graph audit
        run: bash scripts/jinguissl_ci_audit.sh hosted-graph .

      - name: Validate dependency lock on merge and main
        if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        run: bash scripts/jinguissl_ci_audit.sh dependency-lock .

      - name: Cache Cangjie SDK
        uses: actions/cache@v4
        with:
          path: ~/.cangjie/${{ env.CANGJIE_SDK_NAME }}
          key: ${{ runner.os }}-${{ env.CANGJIE_SDK_NAME }}-${{ env.CANGJIE_SDK_SHA256 }}

      - name: Install Cangjie toolchain
        run: |
          mkdir -p "$HOME/.cangjie"
          sdk_root="$HOME/.cangjie/${CANGJIE_SDK_NAME}"
          archive="$RUNNER_TEMP/${CANGJIE_SDK_NAME}.tar.gz"
          if [ ! -x "$sdk_root/bin/cjc" ] || [ ! -x "$sdk_root/tools/bin/cjpm" ]; then
            curl -fL --retry 4 --retry-all-errors --connect-timeout 20 "$CANGJIE_SDK_URL" -o "$archive"
            echo "${CANGJIE_SDK_SHA256}  $archive" | sha256sum -c -
            rm -rf "$sdk_root"
            mkdir -p "$sdk_root"
            tar -xzf "$archive" -C "$sdk_root" --strip-components=1
          fi
          . "$sdk_root/envsetup.sh"
          echo "$CANGJIE_HOME/bin" >> "$GITHUB_PATH"
          echo "$CANGJIE_HOME/tools/bin" >> "$GITHUB_PATH"
          echo "CANGJIE_HOME=$CANGJIE_HOME" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Cache Cangjie packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cjpm
            ~/.cangjie/packages
            ~/.cache/cangjie
          key: ${{ runner.os }}-cangjie-${{ hashFiles('cjpm.toml', 'cjpm.lock') }}

      - name: Verify Cangjie toolchain
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          command -v cjc
          command -v cjpm
          cjc --version
          cjpm --version

      - name: Build
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          cjpm build

      - name: Test
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          cjpm test
