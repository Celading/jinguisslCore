name: JinguiSSL CI Security Audit

env:
  CANGJIE_SDK_NAME: cangjie-sdk-linux-x64-1.1.3
  CANGJIE_SDK_SHA256: 2b68905afc466e665ae181595c63f96c18d75fd2c1fb6c6f0cb64e179c28d61a
  CANGJIE_SDK_URL: "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.3.tar.gz&objectKey=6a19349d21f5a8178d6fd22b"

on:
  push:
    branches:
      - main
      - master
      - develop
      - "mr/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-safety-audit:
    name: Fork-safe public audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static public-surface audit
        run: bash scripts/jinguissl_ci_audit.sh public .

  trusted-build-test:
    name: Trusted build and test
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    needs: public-safety-audit
    steps:
      - uses: actions/checkout@v4

      - name: Hosted dependency graph audit
        run: bash scripts/jinguissl_ci_audit.sh hosted-graph .

      - name: Cache Cangjie SDK
        uses: actions/cache@v4
        with:
          path: ~/.cangjie/${{ env.CANGJIE_SDK_NAME }}
          key: ${{ runner.os }}-${{ env.CANGJIE_SDK_NAME }}-${{ env.CANGJIE_SDK_SHA256 }}

      - name: Install Cangjie toolchain
        run: |
          mkdir -p "$HOME/.cangjie"
          sdk_root="$HOME/.cangjie/${CANGJIE_SDK_NAME}"
          archive="$RUNNER_TEMP/${CANGJIE_SDK_NAME}.tar.gz"
          if [ ! -x "$sdk_root/bin/cjc" ] || [ ! -x "$sdk_root/tools/bin/cjpm" ]; then
            curl -fsSL "$CANGJIE_SDK_URL" -o "$archive"
            echo "${CANGJIE_SDK_SHA256}  $archive" | sha256sum -c -
            rm -rf "$sdk_root"
            mkdir -p "$sdk_root"
            tar -xzf "$archive" -C "$sdk_root" --strip-components=1
          fi
          . "$sdk_root/envsetup.sh"
          echo "$CANGJIE_HOME/bin" >> "$GITHUB_PATH"
          echo "$CANGJIE_HOME/tools/bin" >> "$GITHUB_PATH"
          echo "CANGJIE_HOME=$CANGJIE_HOME" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Cache Cangjie packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cjpm
            ~/.cangjie/packages
            ~/.cache/cangjie
          key: ${{ runner.os }}-cangjie-${{ hashFiles('**/cjpm.toml') }}
          restore-keys: |
            ${{ runner.os }}-cangjie-

      - name: Verify Cangjie toolchain
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          command -v cjc
          command -v cjpm
          cjc --version
          cjpm --version

      - name: Detect hosted build support
        id: hosted-build
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          enabled=true
          if grep -q 'CANGJIE_STDX_PATH' cjpm.toml; then
            if [ -z "${CANGJIE_STDX_PATH:-}" ]; then
              echo "::warning::CANGJIE_STDX_PATH is not set; hosted build/test is skipped for this dynamic stdx package"
              enabled=false
            elif [ ! -d "$CANGJIE_STDX_PATH" ]; then
              echo "::warning::CANGJIE_STDX_PATH points to a missing path; hosted build/test is skipped for this dynamic stdx package"
              enabled=false
            fi
          fi
          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"

      - name: Build
        if: ${{ steps.hosted-build.outputs.enabled == 'true' }}
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          cjpm build

      - name: Test
        if: ${{ steps.hosted-build.outputs.enabled == 'true' }}
        run: |
          . "$CANGJIE_HOME/envsetup.sh"
          cjpm test

      - name: Record hosted build gap
        if: ${{ steps.hosted-build.outputs.enabled != 'true' }}
        run: |
          echo "Trusted build/test skipped because hosted dynamic stdx material is not available." >> "$GITHUB_STEP_SUMMARY"
